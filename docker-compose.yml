version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: shems_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Tanay@232005
      MYSQL_DATABASE: smart_hospital_energy
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shems_web_app
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_TYPE=mysql
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=Tanay@232005
      - MYSQL_DATABASE=smart_hospital_energy
      - FLASK_PORT=5000
      - FLASK_DEBUG=False
      - MQTT_ENABLED=True
      - MQTT_BROKER=broker.hivemq.com
    depends_on:
      - db

volumes:
  mysql_data:
